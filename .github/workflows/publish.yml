name: Publish to crates.io

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish bsql-arena
        run: cargo publish -p bsql-arena --token ${{ secrets.CRATES_IO_TOKEN }}

      - name: Wait for index
        run: sleep 30

      - name: Publish bsql-driver-postgres
        run: cargo publish -p bsql-driver-postgres --token ${{ secrets.CRATES_IO_TOKEN }}

      - name: Wait for index
        run: sleep 30

      - name: Publish bsql-driver-sqlite
        run: cargo publish -p bsql-driver-sqlite --token ${{ secrets.CRATES_IO_TOKEN }}

      - name: Wait for index
        run: sleep 30

      - name: Publish bsql-core
        run: cargo publish -p bsql-core --token ${{ secrets.CRATES_IO_TOKEN }}

      - name: Wait for index
        run: sleep 30

      - name: Publish bsql-macros
        run: cargo publish -p bsql-macros --token ${{ secrets.CRATES_IO_TOKEN }}

      - name: Wait for index
        run: sleep 30

      - name: Publish bsql
        run: cargo publish -p bsql --token ${{ secrets.CRATES_IO_TOKEN }}
